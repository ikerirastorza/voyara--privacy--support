<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voyara: Travel Map — Support, Privacy & Account</title>
  <meta name="description" content="Official support, privacy, and account information for Voyara: Travel Map." />
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #e6eaf0;
      --radius: 18px;
      --max: 980px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; }
    .nav, .hero, .section, .footer { padding: 24px 0; }
    .nav-row, .footer-row, .grid-2, .grid-3 {
      display: grid;
      gap: 18px;
    }
    .nav-row {
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }
    .brand, .footer-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
    }
    .brand img, .footer-logo img {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: white;
      object-fit: cover;
      border: 1px solid var(--line);
    }
    .brand small, .footer-logo small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .nav-links a, .footer a {
      color: var(--muted);
      text-decoration: none;
    }
    .nav-links a:hover, .footer a:hover { color: var(--text); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
    }
    .lang-switch {
      display: inline-flex;
      gap: 6px;
      background: white;
      border: 1px solid var(--line);
      padding: 4px;
      border-radius: 999px;
    }
    .lang-switch button {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
    }
    .lang-switch button.active {
      background: var(--text);
      color: white;
    }
    .hero {
      padding-top: 40px;
      padding-bottom: 20px;
    }
    .hero-card {
      background: linear-gradient(135deg, rgba(37,99,235,0.05), rgba(245,158,11,0.06));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 32px;
    }
    .eyebrow {
      display: inline-block;
      font-size: 13px;
      color: var(--muted);
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 6px 10px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
    }
    .hero p {
      color: var(--muted);
      font-size: 1.03rem;
      max-width: 720px;
      margin-bottom: 18px;
    }
    .hero-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .section h2 {
      font-size: clamp(1.45rem, 4vw, 2.3rem);
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }
    .section-intro {
      color: var(--muted);
      max-width: 760px;
      margin-bottom: 20px;
    }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
    }
    .card h3, .policy-section h3 {
      font-size: 1.06rem;
      margin-bottom: 8px;
    }
    .card p, .card li, .policy-section p, .policy-section li {
      color: var(--muted);
    }
    .card ul, .policy-section ul {
      padding-left: 18px;
      margin-top: 8px;
    }
    .policy {
      display: grid;
      gap: 14px;
    }
    .policy-section {
      background: white;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
    }
    .footer-row {
      grid-template-columns: 1fr auto;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      color: var(--muted);
    }
    [data-lang] { display: none; }
    html[data-current-lang="es"] [data-lang="es"] { display: inline; }
    html[data-current-lang="en"] [data-lang="en"] { display: inline; }
    html[data-current-lang="es"] .block-es,
    html[data-current-lang="en"] .block-en { display: block; }
    html[data-current-lang="es"] .block-en,
    html[data-current-lang="en"] .block-es { display: none; }
    @media (max-width: 820px) {
      .nav-row, .grid-2, .grid-3, .footer-row { grid-template-columns: 1fr; }
      .nav-links { justify-content: flex-start; }
      .hero-card { padding: 24px; }
    }
  </style>
</head>
